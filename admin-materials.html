<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload New Material</title>
<style>
/* --- STYLES SAME AS YOUR ORIGINAL --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f6fb;}
.header{background:#e9edf5;padding:20px;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:bold;}
.back-btn{position:fixed;top:15px;right:20px;padding:8px 15px;border:none;border-radius:20px;background:#4c6faf;color:white;font-weight:bold;cursor:pointer;}
.back-btn:hover{background:#3b5a94;}
.container{max-width:1100px;margin:60px auto;background:white;padding:25px;border-radius:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.section{background:#f5f7fb;padding:15px;border-radius:8px;}
label{font-size:13px;color:#555;display:block;margin-top:10px;}
input, textarea, select{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:5px;}
textarea{resize:none;height:80px;}
.upload-box{margin-top:10px;border:2px dashed #ccc;padding:25px;text-align:center;border-radius:10px;background:#fafafa;cursor:pointer;}
.upload-box:hover{background:#f0f2f7;}
.upload-box small{display:block;margin-top:10px;color:#777;}
.table{margin-top:10px;}
.table div{display:flex;justify-content:space-between;align-items:center;padding:10px;background:white;border-radius:5px;margin-bottom:5px;}
.btn{padding:8px 12px;border:none;border-radius:5px;cursor:pointer;}
.upload-btn{background:#4c6faf;color:white;}
.remove-btn{background:#e55353;color:white;}
.footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.secondary-btn{background:#ccc;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>
<div class="header">📁 Upload New Material</div>

<div class="container">
<div class="grid">

<!-- LEFT SIDE -->
<div class="section">
<h3>Material Information</h3>
<label>Title</label>
<input type="text" id="title" placeholder="Introduction to Web Development">
<label>Description</label>
<textarea id="desc" placeholder="Enter a brief description of the material"></textarea>

<label>File Upload</label>
<div class="upload-box" onclick="document.getElementById('fileInput').click()">
📤 Drag & drop file here or <b>Browse Files</b>
<small>Supported file types: PDF, DOCX, PPTX, XLSX</small>
</div>
<input type="file" id="fileInput" style="display:none" onchange="handleFile(event)">
</div>

<!-- RIGHT SIDE -->
<div>
<div class="section">
<h3>Select Course & Lesson</h3>
<label>Course</label>
<select id="courseSelect" onchange="loadLessons()"></select>
<label>Lesson</label>
<select id="lessonSelect"></select>
</div>

<div class="section">
<h3>Attached Materials</h3>
<div class="table" id="materialList"></div>
</div>
</div>

</div>

<div class="footer">
<button class="btn upload-btn" onclick="uploadMaterial()">⬆ Upload Material</button>
<button class="btn secondary-btn" onclick="goBack()">⬅ Back to Materials</button>
<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>

<script>
function goDashboard() {
    window.location.href = "admin-dashboard.html";
}
</script>
</div>
</div>

<script type="module">
import { db, storage } from './firebase.js';
import { collection, getDocs, addDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

let courses = [];
let materials = [];
let uploadedFile = null;

/* NAV */
function goDashboard(){ window.location.href="admin-dashboard.html"; }
function goBack(){ window.location.href="admin-materials.html"; }

/* LOAD COURSES FROM FIRESTORE */
async function loadCourses(){
    courses = [];
    const query = await getDocs(collection(db, "courses"));
    const select = document.getElementById("courseSelect");
    select.innerHTML = "";
    query.forEach(c => {
        courses.push({ id: c.id, ...c.data() });
        select.innerHTML += `<option value="${courses.length-1}">${c.data?.name || c.data.name}</option>`;
    });
    loadLessons();
}

/* LOAD LESSONS BASED ON COURSE */
function loadLessons(){
    const courseIndex = document.getElementById("courseSelect").value;
    const lessonSelect = document.getElementById("lessonSelect");
    lessonSelect.innerHTML = "";
    if(!courses[courseIndex] || !courses[courseIndex].lessons) return;
    courses[courseIndex].lessons.forEach(l => {
        lessonSelect.innerHTML += `<option>${l}</option>`;
    });
}

/* FILE UPLOAD HANDLER */
function handleFile(e){
    uploadedFile = e.target.files[0];
    if(uploadedFile) alert("File selected: " + uploadedFile.name);
}

/* LOAD MATERIALS */
async function loadMaterials(){
    materials = [];
    const query = await getDocs(collection(db,"materials"));
    const list = document.getElementById("materialList");
    list.innerHTML = "";
    query.forEach(m=>{
        const data = m.data();
        materials.push({id:m.id, ...data});
        list.innerHTML += `
        <div>
            <span>${data.title}</span>
            <button class="remove-btn" onclick="deleteMaterial('${m.id}')">Remove</button>
        </div>`;
    });
}

/* DELETE MATERIAL */
async function deleteMaterial(id){
    if(!confirm("Delete this material?")) return;
    await deleteDoc(doc(db,"materials",id));
    loadMaterials();
}

/* UPLOAD MATERIAL */
async function uploadMaterial(){
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const courseIndex = document.getElementById("courseSelect").value;
    const lesson = document.getElementById("lessonSelect").value;

    if(!title || !uploadedFile){
        alert("Fill required fields and select a file");
        return;
    }

    // Upload file to Firebase Storage
    const storageRef = ref(storage, `materials/${Date.now()}_${uploadedFile.name}`);
    await uploadBytes(storageRef, uploadedFile);
    const fileURL = await getDownloadURL(storageRef);

    // Save to Firestore
    await addDoc(collection(db,"materials"),{
        title: title,
        description: desc,
        course: courses[courseIndex].name,
        lesson: lesson,
        fileURL: fileURL,
        uploadedAt: new Date()
    });

    alert("Material Uploaded!");
    document.getElementById("title").value="";
    document.getElementById("desc").value="";
    uploadedFile=null;
    loadMaterials();
}

/* INIT */
loadCourses();
loadMaterials();
</script>

</body>
</html>
