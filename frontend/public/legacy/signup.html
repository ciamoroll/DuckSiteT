<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
/* YOUR ORIGINAL STYLE — 100% UNCHANGED */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:url("/images/backgrounds/background.jpg") no-repeat center/cover;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(255,255,200,0.85);
padding:30px;
border-radius:20px;
width:350px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
border:3px solid #2f6b2f;
}

h2{
margin-bottom:20px;
text-align:center;
color:#2f6b2f;
font-weight:bold;
font-size:22px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
background:#2f6b2f;
color:white;
}

input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
font-weight:bold;
}

.signup-btn{
background:#f4e7a1;
color:#2f6b2f;
}

.back-btn{
background:#ccc;
color:#333;
}
</style>
</head>

<body>

<div class="container">
<h2>🦆 DuckSiteT</h2>

<!-- ADDED FIELDS (NO STYLE CHANGE) -->
<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="lastName" placeholder="Last Name">

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="signup-btn" onclick="signup()">Create Account</button>
<button class="back-btn" onclick="goLogin()">Back to Login</button>
</div>

<script src="/runtime-config.js"></script>
<script type="module">
import { supabase } from "/lib-supabase-client.js";
window.apiBaseUrl = window.APP_CONFIG?.API_BASE_URL || "http://localhost:4000";
function isStrongPassword(value){
  return /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(String(value || ""));
}

window.signup = async function(){

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if(!firstName || !lastName || !email || !password){
        alert("Please fill all fields");
        return;
    }
    if(!isStrongPassword(password)){
        alert("Password must be at least 8 characters and include 1 uppercase letter, 1 number, and 1 special character.");
        return;
    }

    try {
        const response = await fetch(`${window.apiBaseUrl}/api/auth/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                firstName,
                lastName,
                email,
                password
            })
        });
        const payload = await response.json();
        if (!response.ok || !payload?.ok) {
            throw new Error(payload?.message || "Signup failed");
        }
        const user = payload.user;

        // Optionally, set session info for immediate use
        localStorage.setItem("userId", user?.id || "");
        localStorage.setItem("email", email);

        alert("Account Created! Please log in.");
        window.location.href = "/login";

    } catch (error) {
        alert(error.message);
        console.error(error);
    }
}

window.goLogin = function(){
    window.location.href = "/login";
}
</script>

</body>
</html>
