<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Class</title>
<script src="/admin-guard.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

/* BACK BUTTON */
.back-btn{
position:fixed;
top:15px;
right:20px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#4c6faf;
color:white;
font-weight:bold;
cursor:pointer;
}

.back-btn:hover{
background:#3b5a94;
}

/* HEADER */
.header{
background:#e9edf5;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:bold;
}

/* FILTERS */
.filters{
padding:15px 20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select, .btn{
padding:8px 10px;
border-radius:5px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.add-btn{
background:#4c6faf;
color:white;
border:none;
}

/* TABLE */
.table-container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th, td{
padding:12px;
font-size:13px;
}

th{
background:#f0f2f7;
}

tr{
border-bottom:1px solid #eee;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:400px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
}

.save-btn{
background:#4c6faf;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
}

.cancel-btn{
background:#ccc;
border:none;
padding:8px 12px;
border-radius:5px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>

<!-- HEADER -->
<div class="header">
<div class="title">Create Classes</div>
</div>

<!-- FILTER BAR -->
<div class="filters">
<select><option>All Departments</option></select>
<select><option>All Levels</option></select>

<button class="btn">Bulk Actions</button>
<button class="btn add-btn" onclick="openModal()">Create Class</button>
</div>

<!-- TABLE -->
<div class="table-container">

<table>
<thead>
<tr>
<th>Class Name</th>
<th>Class Code</th>
<th>Instructor</th>
<th>Students</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="classTable"></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Create New Class</h3>

<input type="text" id="className" placeholder="Class Name">
<input type="text" id="classCode" placeholder="Class Code">
<input type="text" id="instructor" placeholder="Instructor Name">

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">Cancel</button>
<button class="save-btn" onclick="saveClass()">Save</button>
<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>

<script>
function goDashboard() {
    window.location.href = "/admin/dashboard";
}
</script>
</div>
</div>
</div>

<script src="/runtime-config.js"></script>
<script src="/admin-api-client.js"></script>
<script type="module">

/* =========================
   🔥 FIREBASE CLASSES
========================= */
let classes = [];

async function loadClassesFromFirestore(){
  classes = [];
  try {
    const payload = await window.AdminApi.get("/api/classes");
    classes = payload.classes || [];
  } catch (error) {
    console.error("Error loading classes:", error);
    alert(error.message);
  }
  displayClasses();
}

function displayClasses(){
  const table = document.getElementById("classTable");
  table.innerHTML = "";
  classes.forEach((c,i)=>{
    table.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.code}</td>
<td>${c.instructor}</td>
<td>${c.students || 0}</td>
<td>
<button onclick="editClass('${c.id}')">✏️</button>
<button onclick="deleteClass('${c.id}')">🗑️</button>
</td>
</tr>
    `;
  });
}

async function editClass(id){
  const classItem = classes.find((c) => String(c.id) === String(id));
  if(!classItem) return;
  const name = prompt("Edit class name:", classItem.name || "");
  if(!name) return;
  const code = prompt("Edit class code:", classItem.code || "");
  if(!code) return;
  const instructor = prompt("Edit instructor:", classItem.instructor || "");
  if(!instructor) return;
  try{
    await window.AdminApi.put(`/api/classes/${id}`, { name, code, instructor });
    loadClassesFromFirestore();
  }catch(e){
    alert(e.message);
  }
}

/* BACK */
function goDashboard(){
  window.location.href = "/admin/dashboard";
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* SAVE CLASS */
async function saveClass(){
  const usersPayload = await window.AdminApi.get("/api/users");
  const studentCount = (usersPayload.users || []).length;

  let name = document.getElementById("className").value;
  let code = document.getElementById("classCode").value;
  let instructor = document.getElementById("instructor").value;

  if(name==="" || code==="" || instructor===""){
    alert("Fill all fields");
    return;
  }

  try{
    await window.AdminApi.post("/api/classes", {
      name: name,
      code: code,
      instructor: instructor,
      students: studentCount || 0
    });
    closeModal();
    loadClassesFromFirestore();
  }catch(e){
    console.error("Error adding class:", e);
    alert(e.message);
  }
}

/* DELETE CLASS */
async function deleteClass(id){
  if(!confirm("Delete this class?")) return;
  try{
    await window.AdminApi.delete(`/api/classes/${id}`);
    loadClassesFromFirestore();
  }catch(e){
    console.error("Error deleting class:", e);
    alert(e.message);
  }
}

/* INIT */
window.openModal = openModal;
window.closeModal = closeModal;
window.saveClass = saveClass;
window.editClass = editClass;
window.deleteClass = deleteClass;

loadClassesFromFirestore();
</script>

</body>
</html>
