<!DOCTYPE html>
<html>
<head>
<title>DuckSiteT Lessons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:url("pond-/images/backgrounds/background.jpg") center/cover no-repeat;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:linear-gradient(90deg,#0d0d0d,#7a6a22,#c9ad45);
}

.logo{
display:flex;
align-items:center;
font-weight:bold;
}

.logo img{
width:30px;
margin-right:8px;
}

.top-right{
display:flex;
align-items:center;
gap:10px;
}

.level{
background:#e6d36f;
color:black;
padding:3px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
}

.avatar{
background:#e6d36f;
color:black;
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* LESSON AREA */

.lesson-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
padding:60px;
text-align:center;
}

/* LESSON BUTTON */

.lesson{
width:150px;
height:100px;
margin:auto;
background:gold;
border-radius:50% 50% 45% 45%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
cursor:pointer;
position:relative;
box-shadow:0 6px 10px rgba(0,0,0,.5);
}

.lesson::before{
content:"🦆🦆🦆";
position:absolute;
top:-25px;
font-size:18px;
}

/* LOCKED */

.locked{
background:#999;
cursor:not-allowed;
opacity:.6;
}

.locked::after{
content:"🔒";
position:absolute;
bottom:-20px;
font-size:18px;
}

/* HOVER */

.lesson:hover:not(.locked){
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="/images/logos/duck-logo.png">
DuckSiteT
</div>

<div class="top-right">
🏆 <span id="points">0</span>
<div class="level">Level <span id="level">1</span></div>
<div class="avatar" id="avatar">U</div>
</div>

</div>

<!-- LESSONS -->

<div class="lesson-container" id="lessonContainer"></div>


<script>

/* USER DATA */

let points = parseInt(localStorage.getItem("xp")) || 0;
let level = localStorage.getItem("level") || 1;
let firstName = localStorage.getItem("firstName") || "User";
let lastName = localStorage.getItem("lastName") || "";

/* DISPLAY USER */

document.getElementById("points").innerText = points;
document.getElementById("level").innerText = level;

let initials = firstName.charAt(0) + lastName.charAt(0);
document.getElementById("avatar").innerText = initials.toUpperCase();


/* LESSON DATA */

let lessons = [
{ title:"Lesson 1", cost:0, reward:50 },
{ title:"Lesson 2", cost:50, reward:50 },
{ title:"Lesson 3", cost:100, reward:50 },
{ title:"Lesson 4", cost:150, reward:50 },
{ title:"Lesson 5", cost:200, reward:50 },
{ title:"Lesson 6", cost:250, reward:50 }
];


/* LOAD LESSONS */

function loadLessons(){

let container = document.getElementById("lessonContainer");
container.innerHTML = "";

lessons.forEach((lesson,index)=>{

let div = document.createElement("div");
div.classList.add("lesson");

if(points < lesson.cost){
div.classList.add("locked");
}

div.innerText = lesson.title;

div.onclick = function(){
openLesson(index);
};

container.appendChild(div);

});

}


/* OPEN LESSON */

function openLesson(index){

let lesson = lessons[index];

if(points < lesson.cost){
alert("Not enough points to unlock this lesson.");
return;
}

/* GIVE REWARD */

points += lesson.reward;
localStorage.setItem("xp", points);

/* LEVEL SYSTEM */

if(points >= 500){
level++;
localStorage.setItem("level", level);
points = 0;
localStorage.setItem("xp", points);
}

/* SAVE COMPLETION */

localStorage.setItem("lesson"+index, "done");

alert(lesson.title + " completed! +"+lesson.reward+" pts");

/* RELOAD */

loadLessons();
document.getElementById("points").innerText = points;
document.getElementById("level").innerText = level;

}


/* INIT */

loadLessons();

</script>

</body>
</html>
