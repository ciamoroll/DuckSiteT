<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Courses</title>
<script src="/admin-guard.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

/* BACK BUTTON */
.back-btn{
position:fixed;
top:15px;
right:20px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#4c6faf;
color:white;
font-weight:bold;
cursor:pointer;
}

.back-btn:hover{
background:#3b5a94;
}

/* HEADER */
.header{
background:#e9edf5;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
font-weight:bold;
}

/* FILTERS */
.filters{
padding:15px 20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 10px;
border-radius:5px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.add-btn{
background:#4c6faf;
color:white;
border:none;
}

/* TABLE */
.table-container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th, td{
padding:12px;
font-size:13px;
}

th{
background:#f0f2f7;
}

tr{
border-bottom:1px solid #eee;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:450px;
max-height:90vh;
overflow:auto;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
}

.save-btn{
background:#4c6faf;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
}

.cancel-btn{
background:#ccc;
border:none;
padding:8px 12px;
border-radius:5px;
}

/* CLASS BOX */
.class-box{
display:flex;
justify-content:space-between;
background:#f5f7fb;
padding:8px;
border-radius:5px;
margin-bottom:5px;
}

/* LESSON BOX */
.lesson-box{
display:flex;
justify-content:space-between;
background:#eef1f7;
padding:8px;
border-radius:5px;
margin-bottom:5px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>

<div class="header">
<div class="title">Manage Courses</div>
</div>

<div class="filters">
<button class="btn add-btn" onclick="openModal()">+ Add Course</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Course Name</th>
<th>Code</th>
<th>Description</th>
<th>Classes</th>
<th>Lessons</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="courseTable"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Create Course</h3>

<input type="text" id="courseName" placeholder="Course Name">
<input type="text" id="courseCode" placeholder="Course Code">
<textarea id="description" placeholder="Description"></textarea>

<h4>Assign Classes</h4>
<div id="classList"></div>

<h4>Lessons</h4>
<div id="lessonList"></div>
<button class="btn add-btn" onclick="addLesson()">+ Add Lesson</button>

<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">Cancel</button>
<button class="save-btn" onclick="saveCourse()">Save</button>
</div>
</div>
</div>

<script src="/runtime-config.js"></script>
<script src="/admin-api-client.js"></script>
<script type="module">

/* =========================
   🔥 FIREBASE COURSES
========================= */
let courses = [];
let classes = [];
let assigned = [];
let lessons = [];
let editingCourseId = null;

/* NAV */
function goDashboard(){
  window.location.href = "/admin/dashboard";
}

/* LOAD CLASSES */
async function loadClasses(){
  classes = [];
  try {
    const payload = await window.AdminApi.get("/api/classes");
    classes = payload.classes || [];
  } catch (error) {
    console.error("Error loading classes:", error);
    alert(error.message);
    return;
  }
  displayClasses();
}

function displayClasses(){
  const list = document.getElementById("classList");
  list.innerHTML="";
  classes.forEach((c,i)=>{
    list.innerHTML += `
    <div class="class-box">
      <span>${c.name}</span>
      <button onclick="assignClass(${i})">Assign</button>
    </div>
    `;
  });
}

function assignClass(i){ assigned.push(classes[i]); updateAssigned(); }
function removeClass(i){ assigned.splice(i,1); updateAssigned(); }
function updateAssigned(){
  const list = document.getElementById("assignedList");
  if(!list) return;
  list.innerHTML="";
  assigned.forEach((c,i)=>{
    list.innerHTML+=`
    <div class="class-box">
      <span>${c.name}</span>
      <button onclick="removeClass(${i})">Remove</button>
    </div>
    `;
  });
}

/* LESSONS */
function addLesson(){
  let name = prompt("Lesson name:");
  if(!name) return;
  lessons.push(name);
  updateLessons();
}
function removeLesson(i){ lessons.splice(i,1); updateLessons(); }
function updateLessons(){
  const list = document.getElementById("lessonList");
  list.innerHTML="";
  lessons.forEach((l,i)=>{
    list.innerHTML+=`
    <div class="lesson-box">
      <span>${l}</span>
      <button onclick="removeLesson(${i})">Remove</button>
    </div>
    `;
  });
}

/* MODAL */
function openModal(){ 
  document.getElementById("modal").style.display="flex";
  loadClasses();
}

function closeModal(){ 
  document.getElementById("modal").style.display="none";
  assigned=[]; lessons=[];
  editingCourseId = null;
  document.querySelector(".modal-content h3").innerText = "Create Course";
  document.getElementById("courseName").value = "";
  document.getElementById("courseCode").value = "";
  document.getElementById("description").value = "";
}

/* LOAD COURSES */
async function loadCoursesFromFirestore(){
  courses=[];
  try {
    const payload = await window.AdminApi.get("/api/courses");
    courses = payload.courses || [];
  } catch (error) {
    console.error("Error loading courses:", error);
    alert(error.message);
    return;
  }
  displayCourses();
}

function displayCourses(){
  const table = document.getElementById("courseTable");
  table.innerHTML="";
  courses.forEach((c)=>{
    table.innerHTML += `
    <tr>
      <td>${c.name}</td>
      <td>${c.code}</td>
      <td>${c.description}</td>
      <td>${c.classes ? c.classes.length : 0}</td>
      <td>${c.lessons ? c.lessons.length : 0}</td>
      <td>
        <button onclick="editCourse('${c.id}')">✏️</button>
        <button onclick="deleteCourse('${c.id}')">🗑️</button>
      </td>
    </tr>
    `;
  });
}

async function editCourse(id){
  const c = courses.find((course) => String(course.id) === String(id));
  if(!c) return;
  editingCourseId = id;
  document.querySelector(".modal-content h3").innerText = "Edit Course";
  document.getElementById("courseName").value = c.name || "";
  document.getElementById("courseCode").value = c.code || "";
  document.getElementById("description").value = c.description || "";
  assigned = Array.isArray(c.classes) ? c.classes : [];
  lessons = Array.isArray(c.lessons) ? c.lessons : [];
  updateAssigned();
  updateLessons();
  openModal();
}

/* SAVE COURSE */
async function saveCourse(){
  let name=document.getElementById("courseName").value;
  let code=document.getElementById("courseCode").value;
  let desc=document.getElementById("description").value;
  if(!name||!code){ alert("Fill required fields"); return; }

  try{
    const payload = {
      name:name,
      code:code,
      description:desc,
      classes:assigned,
      lessons:lessons,
      materials:[]
    };
    if (editingCourseId) {
      await window.AdminApi.put(`/api/courses/${editingCourseId}`, payload);
    } else {
      await window.AdminApi.post("/api/courses", payload);
    }
    closeModal();
    loadCoursesFromFirestore();
  }catch(e){ console.error("Error adding course:",e); alert(e.message);}
}

/* DELETE COURSE */
async function deleteCourse(id){
  if(!confirm("Delete this course?")) return;
  try{
    await window.AdminApi.delete(`/api/courses/${id}`);
    loadCoursesFromFirestore();
  }catch(e){ console.error("Error deleting course:",e); alert(e.message);}
}

/* INIT */
window.openModal = openModal;
window.closeModal = closeModal;
window.addLesson = addLesson;
window.saveCourse = saveCourse;
window.editCourse = editCourse;
window.deleteCourse = deleteCourse;
window.assignClass = assignClass;
window.removeClass = removeClass;

loadCoursesFromFirestore();
</script>

</body>
</html>
