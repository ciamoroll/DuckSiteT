<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Challenges</title>
<script src="/admin-guard.js"></script>
<style>
/* --- KEEP YOUR EXISTING STYLES --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
.back-btn{position:fixed;top:15px;right:20px;padding:8px 15px;border:none;border-radius:20px;background:#4c6faf;color:white;font-weight:bold;cursor:pointer;z-index:100;}
body{background:#eef2f7;padding:20px;}
.container{max-width:1100px;margin:auto;background:white;border-radius:10px;padding:25px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.header{display:flex;align-items:center;gap:15px;margin-bottom:10px;}
.header img{width:45px;}
.title{font-size:22px;font-weight:bold;}
.subtitle{color:#666;font-size:14px;margin-bottom:20px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px;}
.create-btn{background:#4c6faf;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;font-weight:bold;}
.create-btn:hover{background:#3a5a96;}
.search{padding:8px;border-radius:5px;border:1px solid #ccc;}
.table-container{overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:white;}
th, td{padding:12px;text-align:left;font-size:14px;}
th{background:#f0f2f7;color:#555;}
tr{border-bottom:1px solid #eee;}
.status{padding:5px 10px;border-radius:10px;font-size:12px;color:white;display:inline-block;}
.active{ background:#39c16c; }
.inactive{ background:#f4b740; }
.actions button{border:none;padding:6px 10px;margin-right:5px;border-radius:5px;cursor:pointer;font-size:12px;}
.edit-btn{background:#d6d9e0;}
.delete-btn{background:#f8d7da;color:#a94442;}
.actions button:hover{opacity:0.8;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;z-index:500;}
.modal-content{background:#fff;border-radius:10px;padding:20px;width:360px;max-width:95vw;}
.modal-content input,.modal-content select{width:100%;padding:9px;margin-bottom:10px;border:1px solid #ccc;border-radius:5px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;}
@media(max-width:768px){
.title{font-size:18px;}
.top-bar{flex-direction:column;align-items:flex-start;}
th, td{font-size:12px;padding:8px;}
}
</style>
</head>
<body>

<div class="container">
<button class="back-btn" onclick="goDashboard()">⬅ Back to Dashboard</button>

<div class="header">
<img src="/images/misc/challenges.png">
<div class="title">Manage Challenges</div>
</div>

<div class="subtitle">Manage and monitor challenges for your users with points and rewards.</div>

<div class="top-bar">
<button class="create-btn" onclick="createChallenge()">+ Create Challenge</button>
<input type="text" class="search" placeholder="Search challenges" id="searchInput">
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Title</th>
<th>Points</th>
<th>Number of Users Completed</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="challengeTable"></tbody>
</table>
</div>

</div>
<div class="modal" id="challengeModal">
  <div class="modal-content">
    <h3 id="challengeModalTitle">Create Challenge</h3>
    <input id="challengeTitle" placeholder="Challenge title" />
    <input id="challengePoints" type="number" min="0" placeholder="Points" />
    <select id="challengeStatus">
      <option>Active</option>
      <option>Inactive</option>
    </select>
    <div class="modal-actions">
      <button onclick="closeChallengeModal()">Cancel</button>
      <button class="create-btn" onclick="saveChallenge()">Save</button>
    </div>
  </div>
</div>

<script src="/runtime-config.js"></script>
<script src="/admin-api-client.js"></script>
<script type="module">

let challenges = [];
let editingChallengeId = null;

/* NAV */
function goDashboard(){ window.location.href = "/admin/dashboard"; }

/* LOAD CHALLENGES FROM BACKEND */
async function loadChallenges(){
    const challengeTable = document.getElementById("challengeTable");
    challengeTable.innerHTML = "";
    challenges = [];
    try {
      const payload = await window.AdminApi.get("/api/challenges");
      challenges = payload.challenges || [];
    } catch (error) {
      console.error("Error loading challenges:", error);
      alert(error.message);
      return;
    }

    displayChallenges(challenges);
}

/* DISPLAY CHALLENGES */
function displayChallenges(list){
    const table = document.getElementById("challengeTable");
    table.innerHTML = "";
    list.forEach((c,i)=>{
        table.innerHTML += `
        <tr>
            <td>${c.title}</td>
            <td>${c.points}</td>
            <td>${c.completed || 0}</td>
            <td><span class="status ${c.status.toLowerCase()}">${c.status}</span></td>
            <td class="actions">
                <button class="edit-btn" onclick="editChallenge('${c.id}')">Edit</button>
                <button class="delete-btn" onclick="deleteChallenge('${c.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

/* CREATE CHALLENGE */
function createChallenge(){
    editingChallengeId = null;
    document.getElementById("challengeModalTitle").innerText = "Create Challenge";
    document.getElementById("challengeTitle").value = "";
    document.getElementById("challengePoints").value = "";
    document.getElementById("challengeStatus").value = "Active";
    document.getElementById("challengeModal").style.display = "flex";
}

/* DELETE CHALLENGE */
async function deleteChallenge(id){
    if(!confirm("Delete this challenge?")) return;
    await window.AdminApi.delete(`/api/challenges/${id}`);
    loadChallenges();
}

/* EDIT CHALLENGE */
async function editChallenge(id){
    const challenge = challenges.find(c=>String(c.id)===String(id));
    if(!challenge) return;
    editingChallengeId = id;
    document.getElementById("challengeModalTitle").innerText = "Edit Challenge";
    document.getElementById("challengeTitle").value = challenge.title || "";
    document.getElementById("challengePoints").value = challenge.points || 0;
    document.getElementById("challengeStatus").value = challenge.status || "Active";
    document.getElementById("challengeModal").style.display = "flex";
}

function closeChallengeModal(){
  document.getElementById("challengeModal").style.display = "none";
}

async function saveChallenge(){
  const title = document.getElementById("challengeTitle").value.trim();
  const points = Number(document.getElementById("challengePoints").value || 0);
  const status = document.getElementById("challengeStatus").value;
  if (!title || points < 0) return alert("Please provide valid challenge details.");
  const payload = { title, points, status, completed: 0 };
  if (editingChallengeId) {
    await window.AdminApi.put(`/api/challenges/${editingChallengeId}`, payload);
  } else {
    await window.AdminApi.post("/api/challenges", payload);
  }
  closeChallengeModal();
  loadChallenges();
}

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("input",(e)=>{
    const filtered = challenges.filter(c=>c.title.toLowerCase().includes(e.target.value.toLowerCase()));
    displayChallenges(filtered);
});

/* INIT */
window.createChallenge = createChallenge;
window.deleteChallenge = deleteChallenge;
window.editChallenge = editChallenge;
window.closeChallengeModal = closeChallengeModal;
window.saveChallenge = saveChallenge;

loadChallenges();
</script>

</body>
</html>
