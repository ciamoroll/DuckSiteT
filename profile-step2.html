<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup - Step 2</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url("background.jpg") no-repeat center center/cover;
}

/* Header */
.header {
    position: absolute;
    top: 15px;
    left: 20px;
    font-size: 20px;
    font-weight: bold;
    color: #ffd84d;
}

/* Container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    width: 600px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 200, 0.8);
    border: 3px solid #2f6b2f;
    backdrop-filter: blur(6px);
}

/* Title */
.title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: #1f4d1f;
    margin-bottom: 15px;
}

/* Top Row */
.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Profile Text */
.profile-text {
    font-weight: bold;
    color: #1f4d1f;
}

/* Profile Icon */
.profile-icon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #2f6b2f;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
}

/* Progress Bar */
.progress-container {
    margin-top: 10px;
}

.progress-labels {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    color: #1f4d1f;
    font-size: 14px;
}

.progress-bar {
    height: 10px;
    background: #2f6b2f;
    border-radius: 10px;
    margin-top: 5px;
    overflow: hidden;
}

.progress-fill {
    width: 66%;
    height: 100%;
    background: #f4e7a1;
}

/* Labels */
label {
    display: block;
    margin-top: 20px;
    font-weight: bold;
    color: #1f4d1f;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    background: #2f6b2f;
    border: none;
    color: white;
}

input::placeholder {
    color: #ddd;
}

/* Buttons */
.buttons {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 12px 40px;
    border-radius: 25px;
    border: none;
    background: #f4e7a1;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #e6d98a;
}

</style>
</head>

<body>

<div class="header">
🦆 DuckSiteT
</div>

<div class="container">

<div class="card">

<div class="title">Welcome to DuckSiteT!</div>

<div class="top-row">
<div class="profile-text">Profile Setup</div>
<div class="profile-icon">👤</div>
</div>

<div class="progress-container">
<div class="progress-labels">
<span></span>
<span>Step 2 of 3</span>
</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>
</div>

<label>Student ID Number</label>
<input type="text" id="studentID" placeholder="Enter Student ID">

<div class="buttons">
<button onclick="goBack()">Back</button>
<button onclick="nextStep()">Next</button>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfTh-4-RYAnNKHiazNNnhH985pDBBDk48",
  authDomain: "ducksitet-55d89.firebaseapp.com",
  projectId: "ducksitet-55d89",
  storageBucket: "ducksitet-55d89.firebasestorage.app",
  messagingSenderId: "1046771611799",
  appId: "1:1046771611799:web:9988a2d30c0d5d5cf8d1d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.goBack = function(){
    window.location.href = "profile-step1.html";
}

window.nextStep = async function(){

    let studentID = document.getElementById("studentID").value;
    let userId = localStorage.getItem("userId");

    if(studentID === ""){
        alert("Please enter your Student ID");
        return;
    }

    try{
        await updateDoc(doc(db, "users", userId), {
            studentID: studentID
        });

        localStorage.setItem("studentID", studentID);

        window.location.href = "profile-step3.html";

    }catch(e){
        alert("Error saving data");
    }
}
</script>

</body>
</html>
