
<!DOCTYPE html>
<html>
<head>
<title>DuckSiteT Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:url("background.jpeg") center/cover no-repeat fixed;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 30px;
background:linear-gradient(90deg,#0d0d0d,#7a6a22,#c9ad45);
border-bottom:2px solid rgba(255,215,0,0.4);
}

.logo{
display:flex;
align-items:center;
font-weight:bold;
font-size:18px;
}

.logo img{
width:35px;
margin-right:8px;
}

nav{
display:flex;
gap:18px;
}

nav a{
text-decoration:none;
color:white;
font-size:14px;
opacity:.8;
}

nav a:hover{
color:#ffd700;
}

nav a.active{
color:#ffd700;
font-weight:bold;
}

.user{
display:flex;
align-items:center;
gap:12px;
}

.points{
display:flex;
align-items:center;
gap:5px;
}

.level{
background:#e6d36f;
color:black;
padding:4px 10px;
border-radius:15px;
font-weight:bold;
font-size:12px;
}

.avatar{
background:#e6d36f;
color:black;
border-radius:50%;
width:32px;
height:32px;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.logout-btn{
background:#ff4d4d;
border:none;
padding:6px 14px;
border-radius:20px;
color:white;
font-weight:bold;
cursor:pointer;
}

.logout-btn:hover{
background:#ff1a1a;
}


/* COURSES GRID */

.course-container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

.courses{
display:grid;
grid-template-columns:repeat(2,260px);
gap:40px;
}

/* COURSE CARD */

.course-card{

background:#f0df72;
color:black;
border-radius:6px;
padding:18px;
border:3px solid #7b6b23;
box-shadow:0 6px 10px rgba(0,0,0,.4);
cursor:pointer;
transition:.25s;
}

.course-card:hover{
transform:scale(1.05);
box-shadow:0 10px 15px rgba(0,0,0,.6);
}

.course-card.active{
border:3px solid #7b6b23;
}

.course-title{
font-weight:bold;
font-size:16px;
margin-bottom:3px;
}

.course-sub{
font-size:12px;
margin-bottom:12px;
}

.progress{
height:8px;
background:#6a7b39;
border-radius:4px;
margin-bottom:8px;
}

.progress-fill{
height:100%;
width:0%;
background:#2f3f12;
border-radius:4px;
}

.progress-text{
font-size:11px;
margin-bottom:15px;
}

.start-btn{
background:#3a4a1a;
color:white;
border:none;
padding:6px 18px;
font-size:11px;
display:block;
margin:auto;
cursor:pointer;
}

.start-btn:hover{
background:#1e260d;
}

.footer{
position:absolute;
bottom:5px;
width:100%;
text-align:center;
font-size:10px;
color:#ddd;
}

</style>
</head>


<body>


<!-- NAVBAR -->

<header class="navbar">

<div class="logo">
<img src="duck-logo.png">
DuckSiteT
</div>

<nav>
<a href="dashboard.html">Dashboard</a>
<a class="active">Courses</a>
<a href="profile.html">Profile</a>
<a href="leaderboard.html">Leaderboard</a>
</nav>

<div class="user">

<div class="points">
🏆 <span id="points">0 pts</span>
</div>

<div class="level">
Level <span id="level">1</span>
</div>

<div class="avatar" id="avatar">
U
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

</header>



<!-- COURSES -->


<section class="course-container">
	<div class="courses" id="courseContainer"></div>
</section>

<div class="footer">
Pateros Technological College
</div>

<section class="course-container">
<div class="courses" id="courseContainer"></div>
</section>



<script>

/* AUTH */
let role = localStorage.getItem("role");
if(!role){ window.location.href="login.html"; }

/* LOAD DATA */
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

document.getElementById("points").innerText = xp + " XP";
document.getElementById("level").innerText = level;

// Ensure default courses exist in localStorage
const defaultCourses = [
	{
		id: "electronics",
		name: "Basic Electronics",
		code: "Tinkercad",
		lessons: ["Intro to Electronics", "Resistors & Circuits", "Breadboarding", "Tinkercad Simulation"]
	},
	{
		id: "programming",
		name: "Programming 1",
		code: "VSCode",
		lessons: ["Intro to Programming", "Variables", "Loops", "Functions"]
	},
	{
		id: "office",
		name: "Office Productivity 1",
		code: "Microsoft Word/PowerPoint",
		lessons: ["Word Basics", "Formatting Docs", "PowerPoint Slides", "Presentations"]
	},
	{
		id: "itfund",
		name: "IT Fundamentals",
		code: "MsExcel",
		lessons: ["IT Overview", "Hardware vs Software", "Excel Basics", "Data Entry"]
	}
];

let courses = JSON.parse(localStorage.getItem("courses")) || [];

// Add default courses if not present (by id)
defaultCourses.forEach(def => {
	if (!courses.some(c => c.id === def.id)) {
		courses.push(def);
	}
});
localStorage.setItem("courses", JSON.stringify(courses));

function loadCourses() {
	let container = document.getElementById("courseContainer");
	container.innerHTML = "";
	if (courses.length === 0) {
		container.innerHTML = "<p>No courses available yet.</p>";
		return;
	}
	courses.forEach((c, i) => {
		container.innerHTML += `
			<div class="course-card" onclick="openCourse(${i})">
				<div class="course-title">${c.name}</div>
				<div class="course-sub">${c.code}</div>
				<div class="progress">
					<div class="progress-fill" style="width:0%"></div>
				</div>
				<div class="progress-text">Progress: 0%</div>
				<button class="start-btn">START</button>
			</div>
		`;
	});
}
let firstName = localStorage.getItem("firstName") || "U";
let lastName = localStorage.getItem("lastName") || "";

document.getElementById("avatar").innerText =
(firstName.charAt(0) + lastName.charAt(0)).toUpperCase();

/* OPEN COURSE */
function openCourse(index) {
	localStorage.setItem("currentCourseIndex", index);
	window.location.href = "lessons.html";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
localStorage.removeItem("role");
window.location.href="login.html";
}

/* INIT */
loadCourses();

</script>

</body>
</html>
